server:
  port: 8080

spring:
  application:
    name: api-gateway
  redis:
    host: localhost
    port: 6379
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: trip-service
          uri: ${TRIP_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/trips/**
          filters:
            - JwtAuthFilter
        - id: billing-service
          uri: ${BILLING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/billing/**
          filters:
            - JwtAuthFilter
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - JwtAuthFilter
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
            key-resolver: "#{@ipKeyResolver}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

security:
  jwt:
    secret: "change-this-secret-to-32-bytes-minimum"

eureka:
  client:
    enabled: false
