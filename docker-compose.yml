services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./docker/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "${KAFKA_HOST_PORT:-29092}:29092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_JMX_PORT: ${KAFKA_JMX_PORT}
      KAFKA_JMX_HOSTNAME: ${KAFKA_JMX_HOSTNAME}

      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}

  newrelic-infra:
    image: newrelic/infrastructure:latest
    privileged: true
    environment:
      NRIA_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      NRIA_DISPLAY_NAME: ${NRIA_DISPLAY_NAME}
    volumes:
      - ./newrelic/kafka-config.yml:/etc/newrelic-infra/integrations.d/kafka-config.yml:ro
    depends_on:
      kafka:
        condition: service_started

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME_AUTH}
    volumes:
      - ./newrelic/newrelic.yml:/opt/newrelic/newrelic.yml:ro

  trip-service:
    build:
      context: .
      dockerfile: trip-service/Dockerfile
    ports:
      - "${TRIP_SERVICE_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    env_file:
      - .env
    environment:
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME_TRIP}
    volumes:
      - ./newrelic/newrelic.yml:/opt/newrelic/newrelic.yml:ro

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    ports:
      - "${BILLING_SERVICE_PORT:-8083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    env_file:
      - .env
    environment:
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME_BILLING}
    volumes:
      - ./newrelic/newrelic.yml:/opt/newrelic/newrelic.yml:ro

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "${PAYMENT_SERVICE_PORT:-8084}:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    environment:
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME_PAYMENT}
    volumes:
      - ./newrelic/newrelic.yml:/opt/newrelic/newrelic.yml:ro

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      auth-service:
        condition: service_started
      trip-service:
        condition: service_started
      billing-service:
        condition: service_started
      payment-service:
        condition: service_started
    env_file:
      - .env
    environment:
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME_GATEWAY}
    volumes:
      - ./newrelic/newrelic.yml:/opt/newrelic/newrelic.yml:ro
