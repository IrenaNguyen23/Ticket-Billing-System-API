server:
  port: ${AUTH_SERVICE_PORT}

spring:
  application:
    name: AUTH-SERVICE
  datasource:
    url: ${AUTH_DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

eureka:
  client:
    enabled: false
