server:
  port: 8081

spring:
  application:
    name: AUTH-SERVICE
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  redis:
    host: localhost
    port: 6379

security:
  jwt:
    secret: "change-this-secret-to-32-bytes-minimum"
    access-ttl-minutes: 15
    refresh-ttl-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

eureka:
  client:
    enabled: false
